<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UBS | Alpha Partners — Financial Planning Suite</title>
  <meta name="description" content="A structured tool for budgeting, per-account investment growth, debt strategy, tax optimization, and 30-year wealth projection." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23c9a84c'/></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #0a0c0f; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <!-- PropTypes (dependency for Recharts UMD) -->
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

  <!-- Recharts UMD -->
  <script crossorigin src="https://unpkg.com/recharts@2.15.3/umd/Recharts.js"></script>

  <!-- Babel Standalone -->
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>

  <script type="text/babel">
const { useState, useMemo, useEffect } = React;
const { PieChart, Pie, Cell, Tooltip, ResponsiveContainer, AreaChart, Area, XAxis, YAxis, CartesianGrid, Line, Legend } = Recharts;

// ── Theme ─────────────────────────────────────────────────────────────
const C = {
  bg: "#0a0c0f", card: "#111318", cardHover: "#161922", border: "#1e2028",
  text: "#e8e6e1", dim: "#8a8d96", gold: "#c9a84c", goldDim: "#c9a84c88",
  goldSubtle: "#c9a84c18", green: "#4caf50", red: "#ef5350", blue: "#5c8fd6",
  orange: "#e8975e", purple: "#a78bfa", pink: "#f472b6", teal: "#2dd4bf",
};
const FM = `'IBM Plex Sans', sans-serif`;
const FD = `'Playfair Display', serif`;
const FMO = `'IBM Plex Mono', monospace`;
const GOAL_COLORS = [C.blue, C.orange, C.green, C.gold, C.purple, C.pink];

const ACCT = {
  checking:  { label: "Checking",          color: C.dim,    growth: "none",     tax: "none",       icon: "🏦" },
  savings:   { label: "HYSA / Savings",    color: C.green,  growth: "hysa",     tax: "ordinary",   icon: "💰" },
  k401:      { label: "401(k)",            color: C.gold,   growth: "pretax",   tax: "ordinary",   icon: "📈" },
  trad_ira:  { label: "Traditional IRA",   color: C.orange, growth: "pretax",   tax: "ordinary",   icon: "📊" },
  roth_ira:  { label: "Roth IRA",          color: C.purple, growth: "roth",     tax: "free",       icon: "⭐" },
  brokerage: { label: "Brokerage",         color: C.blue,   growth: "taxable",  tax: "ltcg",       icon: "📉" },
};

const fmt$ = (v) => {
  const n = Number(v) || 0;
  if (Math.abs(n) >= 1e6) return `$${(n / 1e6).toFixed(2)}M`;
  if (Math.abs(n) >= 1e3) return `$${(n / 1e3).toFixed(0)}k`;
  return `$${Math.round(n)}`;
};
const fmtFull = (v) => new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(Number(v) || 0);
const pctStr = (v) => `${((Number(v) || 0) * 100).toFixed(1)}%`;

function useWidth() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 800);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return w;
}

// ── Base Components ───────────────────────────────────────────────────
const Card = ({ children, style, pad = 20 }) => (
  <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: pad, ...style }}>{children}</div>
);
const Lbl = ({ children }) => (
  <div style={{ fontSize: 10, fontFamily: FMO, color: C.dim, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 5 }}>{children}</div>
);
const Field = ({ label, value, onChange, prefix, suffix, type = "number", placeholder, disabled }) => (
  <div style={{ marginBottom: 13 }}>
    {label && <Lbl>{label}</Lbl>}
    <div style={{ display: "flex", alignItems: "center", background: "#080a0d", border: `1px solid ${C.border}`, borderRadius: 8, padding: "0 10px", opacity: disabled ? 0.5 : 1 }}>
      {prefix && <span style={{ color: C.gold, fontFamily: FMO, fontSize: 13, marginRight: 4 }}>{prefix}</span>}
      <input type={type} value={value} disabled={disabled}
        onChange={e => onChange(type === "number" ? (e.target.value === "" ? "" : Number(e.target.value)) : e.target.value)}
        placeholder={placeholder}
        style={{ flex: 1, background: "transparent", border: "none", outline: "none", color: C.text, fontFamily: FMO, fontSize: 14, padding: "10px 0", width: "100%" }} />
      {suffix && <span style={{ color: C.dim, fontFamily: FMO, fontSize: 11, whiteSpace: "nowrap" }}>{suffix}</span>}
    </div>
  </div>
);
const Sel = ({ label, value, onChange, options }) => (
  <div style={{ marginBottom: 13 }}>
    {label && <Lbl>{label}</Lbl>}
    <select value={value} onChange={e => onChange(e.target.value)}
      style={{ width: "100%", background: "#080a0d", border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, fontFamily: FMO, fontSize: 13, padding: "10px 10px", outline: "none" }}>
      {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);
const Btn = ({ children, onClick, secondary, disabled, full, style: s }) => (
  <button onClick={onClick} disabled={disabled} style={{
    background: secondary ? "transparent" : disabled ? C.goldDim : `linear-gradient(135deg,${C.gold},#b8943f)`,
    color: secondary ? C.gold : disabled ? C.dim : C.bg,
    border: secondary ? `1px solid ${C.goldDim}` : "none",
    borderRadius: 8, padding: "11px 24px", fontFamily: FMO, fontSize: 11, fontWeight: 600,
    letterSpacing: 1, textTransform: "uppercase", cursor: disabled ? "not-allowed" : "pointer",
    width: full ? "100%" : "auto", transition: "all 0.2s", ...s,
  }}>{children}</button>
);
const Metric = ({ label, value, color, small, sub }) => (
  <div style={{ textAlign: "center", padding: small ? "7px 4px" : "11px 4px" }}>
    <div style={{ fontSize: 10, fontFamily: FMO, color: C.dim, textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 3 }}>{label}</div>
    <div style={{ fontSize: small ? 17 : 22, fontFamily: FD, color: color || C.gold, fontWeight: 700, lineHeight: 1 }}>{value}</div>
    {sub && <div style={{ fontSize: 10, fontFamily: FMO, color: C.dim, marginTop: 3 }}>{sub}</div>}
  </div>
);
const Rule = () => <div style={{ height: 1, background: `linear-gradient(90deg,transparent,${C.gold},transparent)`, margin: "14px 0" }} />;
const ProgBar = ({ pct: p, color, label, sub }) => (
  <div style={{ marginBottom: 9 }}>
    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
      <span style={{ fontSize: 11, fontFamily: FM, color: C.dim }}>{label}</span>
      <span style={{ fontSize: 11, fontFamily: FMO, color: color || C.gold }}>{sub || `${Math.min(p, 100).toFixed(0)}%`}</span>
    </div>
    <div style={{ height: 5, background: C.goldSubtle, borderRadius: 3, overflow: "hidden" }}>
      <div style={{ height: "100%", width: `${Math.min(Math.max(p, 0), 100)}%`, background: color || C.gold, borderRadius: 3, transition: "width 0.8s" }} />
    </div>
  </div>
);
const Bench = ({ icon, text, color }) => (
  <div style={{ display: "flex", alignItems: "flex-start", gap: 8, padding: "8px 10px", background: `${color}15`, border: `1px solid ${color}40`, borderRadius: 8, marginBottom: 6 }}>
    <span style={{ fontSize: 13 }}>{icon}</span>
    <span style={{ fontSize: 11, fontFamily: FM, color: C.text, lineHeight: 1.5 }}>{text}</span>
  </div>
);

const TT_STYLE = { background: "#111318", border: "1px solid #1e2028", borderRadius: 8, fontFamily: FMO, fontSize: 11 };

// ── Steps ─────────────────────────────────────────────────────────────
const STEPS = [
  { id: "welcome" }, { id: "income", label: "Income" }, { id: "expenses", label: "Expenses" },
  { id: "debt", label: "Debt" }, { id: "assets", label: "Assets" }, { id: "goals", label: "Goals" },
  { id: "savings_goals", label: "Savings Goals" }, { id: "tax_optimizer", label: "Tax Optimizer" },
  { id: "results", label: "Plan" },
];

function projectAccount(startBal, monthlyContrib, annualReturn, taxDragPct, years) {
  const effectiveAnnual = annualReturn - taxDragPct;
  const mr = effectiveAnnual / 100 / 12;
  let bal = Number(startBal) || 0;
  const pts = [{ year: 0, balance: Math.round(bal) }];
  for (let m = 1; m <= years * 12; m++) {
    bal = bal * (1 + mr) + (Number(monthlyContrib) || 0);
    if (m % 12 === 0) pts.push({ year: m / 12, balance: Math.round(bal) });
  }
  return pts;
}

// ── Main App ──────────────────────────────────────────────────────────
function App() {
  const w = useWidth();
  const mob = w < 700;
  const [step, setStep] = useState(0);
  const [anim, setAnim] = useState(false);

  // Income
  const [salary, setSalary] = useState("");
  const [otherInc, setOtherInc] = useState("");
  const [taxRate, setTaxRate] = useState(20);
  const [k401pct, setK401pct] = useState("");
  const [matchPct, setMatchPct] = useState("");

  // Expenses
  const [rent, setRent] = useState("");
  const [utils, setUtils] = useState("");
  const [groc, setGroc] = useState("");
  const [trans, setTrans] = useState("");
  const [ins, setIns] = useState("");
  const [minDebt, setMinDebt] = useState("");
  const [otherNeeds, setOtherNeeds] = useState("");
  const [dining, setDining] = useState("");
  const [ent, setEnt] = useState("");
  const [shop, setShop] = useState("");
  const [subs, setSubs] = useState("");
  const [trav, setTrav] = useState("");
  const [otherWants, setOtherWants] = useState("");

  // Debt
  const [debts, setDebts] = useState([{ name: "Student Loans", balance: "", rate: 5.5, minPayment: "" }]);
  const [debtStrat, setDebtStrat] = useState("avalanche");

  // Assets
  const [checking, setChecking] = useState("");
  const [savings, setSavings] = useState("");
  const [hysaRate, setHysaRate] = useState(3.75);
  const [bal401k, setBal401k] = useState("");
  const [balTradIRA, setBalTradIRA] = useState("");
  const [balRothIRA, setBalRothIRA] = useState("");
  const [balBrok, setBalBrok] = useState("");
  const [otherAssets, setOtherAssets] = useState("");

  // Goals
  const [eMons, setEMons] = useState(6);
  const [retAge, setRetAge] = useState(65);
  const [curAge, setCurAge] = useState("");
  const [expRet, setExpRet] = useState(7);

  // Savings Goals
  const [sGoals, setSGoals] = useState([]);

  // Tax Optimizer
  const [hasHSA, setHasHSA] = useState("yes");
  const [hsaContrib, setHsaContrib] = useState("");
  const [hsaType, setHsaType] = useState("individual");
  const [hsaRecurring, setHsaRecurring] = useState("recurring");
  const [hasRoth, setHasRoth] = useState("yes");
  const [rothContrib, setRothContrib] = useState("");
  const [rothRecurring, setRothRecurring] = useState("recurring");
  const [rothCatchup, setRothCatchup] = useState("no"); // default off = $7,500 base limit
  const [filingStatus, setFilingStatus] = useState("single");

  // What-if
  const [wiSavBoost, setWiSavBoost] = useState(5);
  const [wiRetBoost, setWiRetBoost] = useState(1);

  const nav = (t) => { setAnim(true); setTimeout(() => { setStep(t); setAnim(false); }, 230); };

  const calc = useMemo(() => {
    const grossM = ((Number(salary) || 0) + (Number(otherInc) || 0)) / 12;
    const c401k = grossM * ((Number(k401pct) || 0) / 100);
    const match = grossM * (Math.min(Number(matchPct) || 0, Number(k401pct) || 0) / 100);
    const taxable = grossM - c401k;
    const tr = Number(taxRate) || 0;
    const taxes = taxable * (tr / 100);
    const net = taxable - taxes;

    const needs = [rent, utils, groc, trans, ins, minDebt, otherNeeds].reduce((s, v) => s + (Number(v) || 0), 0);
    const wants = [dining, ent, shop, subs, trav, otherWants].reduce((s, v) => s + (Number(v) || 0), 0);
    const surplus = net - needs - wants;
    const needsPct = net > 0 ? needs / net : 0;
    const wantsPct = net > 0 ? wants / net : 0;
    const savPct = net > 0 ? Math.max(0, surplus) / net : 0;

    const totalDebt = debts.reduce((s, d) => s + (Number(d.balance) || 0), 0);
    const liquidTotal = (Number(checking) || 0) + (Number(savings) || 0);
    const investTotal = (Number(bal401k) || 0) + (Number(balTradIRA) || 0) + (Number(balRothIRA) || 0) + (Number(balBrok) || 0);
    const totalAssets = liquidTotal + investTotal + (Number(otherAssets) || 0);
    const netWorth = totalAssets - totalDebt;

    const eFund = needs * eMons;
    const eProg = savings > 0 ? Math.min(100, (savings / eFund) * 100) : 0;

    const sorted = [...debts].filter(d => d.balance > 0).sort((a, b) =>
      debtStrat === "avalanche" ? b.rate - a.rate : a.balance - b.balance);
    let payoffMo = 0, sim = sorted.map(d => ({ ...d, rem: Number(d.balance) || 0 }));
    const extraDebt = Math.max(0, surplus * 0.3);
    let sc = 0;
    while (sim.some(d => d.rem > 0) && sc++ < 600) {
      payoffMo++;
      let ex = extraDebt;
      for (let d of sim) {
        if (d.rem <= 0) continue;
        const int = d.rem * ((Number(d.rate) || 0) / 100 / 12);
        const pay = (Number(d.minPayment) || 0) + ex; ex = 0;
        d.rem = Math.max(0, d.rem + int - pay);
        if (d.rem === 0) ex = pay - int;
      }
    }

    const r = Number(expRet) || 7;
    const yrs = Math.max(1, retAge - curAge);
    const retMo = c401k + match;
    const ltcgRate = tr >= 32 ? 20 : 15;
    const brokerageDrag = 0.30 * (ltcgRate / 100) * r;
    const hysaEffective = (Number(hysaRate) || 3.75) * (1 - tr / 100);
    const pretaxRate = r;
    const rothRate = r;

    const pts401k = projectAccount(bal401k, retMo, pretaxRate, 0, yrs);
    const ptsTradIRA = projectAccount(balTradIRA, 0, pretaxRate, 0, yrs);
    const ptsRothIRA = projectAccount(balRothIRA, 0, rothRate, 0, yrs);
    const ptsBrok = projectAccount(balBrok, 0, r, brokerageDrag, yrs);
    const ptsSavings = projectAccount(savings, 0, hysaEffective, 0, yrs);

    const acctProj = pts401k.map((p, i) => ({
      year: curAge + p.year,
      "401k": p.balance,
      "Trad IRA": ptsTradIRA[i]?.balance || 0,
      "Roth IRA": ptsRothIRA[i]?.balance || 0,
      "Brokerage": ptsBrok[i]?.balance || 0,
      "HYSA": ptsSavings[i]?.balance || 0,
    }));

    const retFinalIdx = acctProj.length - 1;
    const retFinal401k = acctProj[retFinalIdx]["401k"];
    const retFinalTrad = acctProj[retFinalIdx]["Trad IRA"];
    const retFinalRoth = acctProj[retFinalIdx]["Roth IRA"];
    const retFinalBrok = acctProj[retFinalIdx]["Brokerage"];
    const retFinalHYSA = acctProj[retFinalIdx]["HYSA"];
    const retFinalTotal = retFinal401k + retFinalTrad + retFinalRoth + retFinalBrok + retFinalHYSA;

    const nwProj = [];
    let nwBase = netWorth, nwWi = netWorth;
    const mr = r / 100 / 12;
    const wiMr = (r + wiRetBoost) / 100 / 12;
    const mSavBase = Math.max(0, surplus) * 0.4;
    const mSavWi = Math.max(0, surplus + net * (wiSavBoost / 100)) * 0.4;
    for (let m = 0; m <= 360; m++) {
      if (m % 12 === 0) nwProj.push({ year: curAge + m / 12, base: Math.round(nwBase), whatif: Math.round(nwWi) });
      nwBase = nwBase * (1 + mr) + mSavBase;
      nwWi = nwWi * (1 + wiMr) + mSavWi;
    }

    const totPri = sGoals.reduce((s, g) => s + (Number(g.priority) || 1), 0);
    const goalProj = sGoals.map((g, i) => {
      const alloc = totPri > 0 ? (Math.max(0, surplus) * 0.4) * ((Number(g.priority) || 1) / totPri) : 0;
      const gmr = r / 100 / 12; let bal = 0; const pts = []; let reached = null;
      const months = (Number(g.years) || 5) * 12;
      for (let m = 0; m <= months; m++) {
        if (m % 3 === 0) pts.push({ month: m, balance: Math.round(bal), target: Number(g.amount) || 0 });
        if (bal >= (Number(g.amount) || 0) && !reached) reached = m;
        bal = bal * (1 + gmr) + alloc;
      }
      return { ...g, alloc, pts, reached, color: GOAL_COLORS[i % GOAL_COLORS.length] };
    });

    // Tax optimizer — 2026 limits (IRS IR-2025-111, Nov 13 2025)
    const hsaLimit = hsaType === "family" ? 8550 : 4300;
    const catchupAdd = (rothCatchup === "yes") ? 1100 : 0;
    const rothLimit = 7500 + catchupAdd; // 2026: $7,500 base, $8,600 with 50+ catch-up
    const phaseout = filingStatus === "mfj" ? { s: 242000, e: 252000 } : { s: 153000, e: 168000 };
    const annInc = (Number(salary) || 0) + (Number(otherInc) || 0);
    const rothElig = annInc < phaseout.e;
    const rothMax = !rothElig ? 0
      : annInc <= phaseout.s ? rothLimit
      : Math.max(0, Math.round(rothLimit * (1 - (annInc - phaseout.s) / (phaseout.e - phaseout.s))));
    const hsaRem = Math.max(0, hsaLimit - (Number(hsaContrib) || 0));
    const rothRem = Math.max(0, rothMax - (Number(rothContrib) || 0));

    const hsaTaxSav = hsaRecurring === "recurring"
      ? hsaRem * (tr / 100) * yrs
      : hsaRem * (tr / 100);

    const rothF30 = rothRecurring === "recurring"
      ? (() => { const rr = (Number(expRet) || 7) / 100; return rothRem * ((Math.pow(1 + rr, 30) - 1) / rr) * (1 + rr); })()
      : rothRem * Math.pow(1 + (Number(expRet) || 7) / 100, 30);

    const benchmarks = [];
    const housingPct = net > 0 ? (Number(rent) || 0) / net : 0;
    if (housingPct > 0.33) benchmarks.push({ icon: "⚠️", text: `Housing is ${pctStr(housingPct)} of net — guideline is under 30–33%.`, color: C.red });
    else if (housingPct > 0) benchmarks.push({ icon: "✅", text: `Housing at ${pctStr(housingPct)} of net income — within the 30–33% guideline.`, color: C.green });
    if (needsPct > 0.55) benchmarks.push({ icon: "⚠️", text: `Essential expenses are ${pctStr(needsPct)} of net — target is 50%.`, color: C.red });
    if (savPct < 0.1 && net > 0) benchmarks.push({ icon: "⚠️", text: `Savings rate is ${pctStr(savPct)} — aim for at least 20%.`, color: C.red });
    else if (savPct >= 0.2) benchmarks.push({ icon: "✅", text: `Strong savings rate of ${pctStr(savPct)} — above the 20% benchmark.`, color: C.green });
    if (totalDebt > 0 && annInc > 0 && totalDebt / annInc > 0.36) benchmarks.push({ icon: "⚠️", text: `Debt-to-income is elevated — guideline is under 36%.`, color: C.orange });
    if (eProg < 50 && eFund > 0) benchmarks.push({ icon: "⚠️", text: `Emergency fund is ${eProg.toFixed(0)}% funded — prioritize ${eMons} months.`, color: C.orange });
    else if (eProg >= 100) benchmarks.push({ icon: "✅", text: `Emergency fund fully funded at ${eMons} months.`, color: C.green });
    if (hasHSA === "yes" && hsaRem > 0) benchmarks.push({ icon: "💡", text: `$${hsaRem.toLocaleString()} HSA room remaining — triple tax-advantaged.`, color: C.blue });
    if (rothElig && rothRem > 0) benchmarks.push({ icon: "💡", text: `$${rothRem.toLocaleString()} Roth IRA contribution room available.`, color: C.purple });
    if (brokerageDrag > 0 && (Number(balBrok) || 0) > 0) benchmarks.push({ icon: "📊", text: `Brokerage annual tax drag est. ${brokerageDrag.toFixed(2)}% — effective rate ${(r - brokerageDrag).toFixed(2)}%.`, color: C.blue });

    const sf = [
      { name: "Budget Balance", score: needsPct <= 0.55 && wantsPct <= 0.35 ? 25 : needsPct <= 0.6 ? 15 : 5, max: 25 },
      { name: "Emergency Fund", score: Math.min(25, (eProg / 100) * 25), max: 25 },
      { name: "Savings Rate", score: savPct >= 0.2 ? 25 : Math.round(savPct / 0.2 * 25), max: 25 },
      { name: "Debt Mgmt", score: totalDebt === 0 ? 25 : payoffMo < 36 ? 20 : payoffMo < 60 ? 15 : 5, max: 25 },
    ];
    const score = sf.reduce((s, f) => s + f.score, 0);

    const seqAccts = [
      { label: "1st — Taxable Brokerage", color: C.blue, icon: "📉", note: "Spend brokerage first. Long-term gains taxed at lower LTCG rates (0–20%). Preserves tax-deferred compounding." },
      { label: "2nd — Traditional 401k / IRA", color: C.gold, icon: "📈", note: "Drawdown pre-tax accounts next. Withdrawals taxed as ordinary income. Use strategically to manage tax brackets." },
      { label: "3rd — Roth IRA (last)", color: C.purple, icon: "⭐", note: "Preserve Roth as long as possible. Tax-free growth and no RMDs make it the most valuable long-term asset." },
    ];

    return {
      grossM, net, c401k, match, taxes, needs, wants, surplus, needsPct, wantsPct, savPct,
      totalDebt, totalAssets, liquidTotal, investTotal, netWorth, eFund, eProg,
      sorted, payoffMo, extraDebt,
      acctProj, retFinal401k, retFinalTrad, retFinalRoth, retFinalBrok, retFinalHYSA, retFinalTotal,
      yrs, retMo, brokerageDrag, hysaEffective, ltcgRate,
      nwProj, goalProj,
      hsaLimit, rothMax, rothElig, hsaRem, rothRem, hsaTaxSav, rothF30,
      benchmarks, sf, score, seqAccts, taxRate: tr,
    };
  }, [salary, otherInc, taxRate, k401pct, matchPct,
    rent, utils, groc, trans, ins, minDebt, otherNeeds,
    dining, ent, shop, subs, trav, otherWants,
    debts, debtStrat,
    checking, savings, hysaRate, bal401k, balTradIRA, balRothIRA, balBrok, otherAssets,
    eMons, retAge, curAge, expRet, sGoals,

                  <input value={g.name} onChange={e => upd(i, "name", e.target.value)} placeholder="Goal Name"
                    style={{ background: "transparent", border: "none", outline: "none", fontFamily: FM, fontSize: 14, fontWeight: 500, color: C.text, flex: 1, minWidth: 0 }} />
                </div>
                <button onClick={() => rem(i)} style={{ background: "transparent", border: "none", color: C.red, cursor: "pointer", fontFamily: FMO, fontSize: 10, flexShrink: 0 }}>REMOVE</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                <Field label="Target" prefix="$" value={g.amount} onChange={v => upd(i, "amount", v)} />
                <Field label="Timeline" value={g.years} onChange={v => upd(i, "years", v)} suffix="yrs" />
                <Field label="Priority" value={g.priority} onChange={v => upd(i, "priority", v)} suffix="pts" />
              </div>
            </Card>
          ))}
          {sGoals.length > 0 && <Btn secondary onClick={add} full>+ Add Another Goal</Btn>}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <Card>
            <div style={{ fontSize: 10, fontFamily: FMO, color: C.gold, marginBottom: 10 }}>HOW IT WORKS</div>
            <div style={{ fontSize: 11, fontFamily: FM, color: C.dim, lineHeight: 1.7 }}>40% of your surplus is split across goals by Priority Weight.</div>
            <Rule />
            <Metric small label="Monthly for Goals" value={fmt$(avail)} color={C.gold} />
          </Card>
          {sGoals.length > 1 && (
            <Card>
              <div style={{ fontSize: 10, fontFamily: FMO, color: C.gold, marginBottom: 10 }}>ALLOCATION</div>
              {sGoals.map((g, i) => {
                const share = totPri > 0 ? ((Number(g.priority) || 1) / totPri) * 100 : 0;
                const monthly = avail * ((Number(g.priority) || 1) / totPri);
                return <ProgBar key={i} label={g.name || `Goal ${i + 1}`} pct={share} color={GOAL_COLORS[i % GOAL_COLORS.length]} sub={fmt$(monthly) + "/mo"} />;
              })}
            </Card>
          )}
        </div>
      </div>
    </div>
  );
}

          <Metric small label="401k at Ret." value={fmt$(calc.retFinal401k)} color={C.gold} />
          <Metric small label="Trad IRA at Ret." value={fmt$(calc.retFinalTrad)} color={C.orange} />
          <Metric small label="Roth IRA at Ret." value={fmt$(calc.retFinalRoth)} color={C.purple} />
          <Metric small label="Brokerage at Ret." value={fmt$(calc.retFinalBrok)} color={C.blue} />
          <Metric small label="Total Portfolio" value={fmt$(calc.retFinalTotal)} color={C.text} />
        </div>
      </Card>

      {/* Withdrawal Sequencing */}
      <Card style={{ marginBottom: 13 }}>
        <Lbl>Optimal Withdrawal Sequencing</Lbl>
        <p style={{ fontSize: 11, fontFamily: FM, color: C.dim, margin: "6px 0 14px", lineHeight: 1.6 }}>
          The order you draw down accounts in retirement has a significant impact on lifetime taxes and portfolio longevity.
        </p>
        <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "repeat(3,1fr)", gap: 12 }}>
          {calc.seqAccts.map((a, i) => (
            <div key={i} style={{ padding: "14px 16px", background: `${a.color}10`, border: `1px solid ${a.color}35`, borderRadius: 10 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                <span style={{ fontSize: 18 }}>{a.icon}</span>
                <span style={{ fontFamily: FMO, fontSize: 11, color: a.color, fontWeight: 600 }}>{a.label}</span>
              </div>
              <div style={{ fontSize: 11, fontFamily: FM, color: C.dim, lineHeight: 1.6 }}>{a.note}</div>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 12, padding: "10px 14px", background: C.goldSubtle, border: `1px solid ${C.goldDim}`, borderRadius: 8 }}>
          <span style={{ fontSize: 11, fontFamily: FM, color: C.dim, lineHeight: 1.6 }}>
            <strong style={{ color: C.gold }}>RMD Note:</strong> Traditional 401k and IRA accounts require minimum distributions starting at age 73. Roth IRAs have no RMDs, making them ideal to pass to heirs or spend last.
          </span>
        </div>
      </Card>

      {/* Net Worth 30yr */}
      <Card style={{ marginBottom: 13 }}>
        <div style={{ display: "flex", flexDirection: mob ? "column" : "row", alignItems: mob ? "flex-start" : "center", justifyContent: "space-between", marginBottom: 12, gap: 10 }}>
          <div>
            <Lbl>30-Year Net Worth Projection</Lbl>
            <div style={{ fontSize: 10, fontFamily: FM, color: C.dim, marginTop: 2 }}>Base vs. what-if scenario</div>
          </div>
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
            <div>
              <div style={{ fontSize: 9, fontFamily: FMO, color: C.dim, marginBottom: 4 }}>SAVINGS BOOST</div>
              <div style={{ display: "flex", gap: 4 }}>
                {[2, 5, 10].map(v => (
                  <div key={v} onClick={() => setWiSavBoost(v)} style={{ padding: "3px 9px", borderRadius: 7, fontSize: 9, fontFamily: FMO, cursor: "pointer", background: wiSavBoost === v ? C.gold : "transparent", color: wiSavBoost === v ? C.bg : C.dim, border: `1px solid ${wiSavBoost === v ? C.gold : C.border}` }}>+{v}%</div>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 9, fontFamily: FMO, color: C.dim, marginBottom: 4 }}>RETURN BOOST</div>
              <div style={{ display: "flex", gap: 4 }}>
                {[0.5, 1, 2].map(v => (
                  <div key={v} onClick={() => setWiRetBoost(v)} style={{ padding: "3px 9px", borderRadius: 7, fontSize: 9, fontFamily: FMO, cursor: "pointer", background: wiRetBoost === v ? C.blue : "transparent", color: wiRetBoost === v ? C.bg : C.dim, border: `1px solid ${wiRetBoost === v ? C.blue : C.border}` }}>+{v}%</div>
                ))}
              </div>
            </div>
          </div>
        </div>
        <ResponsiveContainer width="100%" height={200}>
          <AreaChart data={calc.nwProj} margin={{ top: 5, right: 10, left: 10, bottom: 5 }}>
            <defs>
              <linearGradient id="nwB" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.gold} stopOpacity={0.25} /><stop offset="95%" stopColor={C.gold} stopOpacity={0} /></linearGradient>
              <linearGradient id="nwW" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.blue} stopOpacity={0.2} /><stop offset="95%" stopColor={C.blue} stopOpacity={0} /></linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
            <XAxis dataKey="year" tick={{ fill: C.dim, fontSize: 9, fontFamily: FMO }} stroke={C.border} />
            <YAxis tick={{ fill: C.dim, fontSize: 9, fontFamily: FMO }} stroke={C.border} tickFormatter={v => fmt$(v)} />
            <Tooltip contentStyle={TT_STYLE} formatter={v => fmtFull(v)} />
            <Legend wrapperStyle={{ fontSize: 10, fontFamily: FMO }} />
            <Area type="monotone" dataKey="base" name="Base Plan" stroke={C.gold} fill="url(#nwB)" strokeWidth={2} dot={false} />
            <Area type="monotone" dataKey="whatif" name={`What-If (+${wiSavBoost}% sav, +${wiRetBoost}% ret)`} stroke={C.blue} fill="url(#nwW)" strokeWidth={2} dot={false} strokeDasharray="5 3" />
          </AreaChart>
        </ResponsiveContainer>
        <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(4,1fr)", gap: 8, marginTop: 10 }}>
          <Metric small label="Base — 10yr" value={fmt$(calc.nwProj[10]?.base)} color={C.gold} />
          <Metric small label="Base — 30yr" value={fmt$(calc.nwProj[30]?.base)} color={C.gold} />
          <Metric small label="What-If — 10yr" value={fmt$(calc.nwProj[10]?.whatif)} color={C.blue} />
          <Metric small label="What-If — 30yr" value={fmt$(calc.nwProj[30]?.whatif)} color={C.blue} />
        </div>
      </Card>

      {/* Savings Goals */}
      {calc.goalProj.length > 0 ? (
        <div style={{ marginBottom: 13 }}>
          <Lbl>Savings Goal Projections</Lbl>
          <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : calc.goalProj.length === 1 ? "1fr" : "1fr 1fr", gap: 13, marginTop: 10 }}>
            {calc.goalProj.map((g, i) => (
              <Card key={i}>
                <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 9 }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: g.color }} />
                  <span style={{ fontFamily: FD, fontSize: 13, color: C.text }}>{g.name || `Goal ${i + 1}`}</span>
                  <span style={{ marginLeft: "auto", fontFamily: FMO, fontSize: 9, color: g.reached ? C.green : C.orange }}>
                    {g.reached ? `✓ ${g.reached}mo` : `>${(Number(g.years) || 5) * 12}mo`}
                  </span>
                </div>
                <ResponsiveContainer width="100%" height={130}>
                  <AreaChart data={g.pts} margin={{ top: 5, right: 5, left: 5, bottom: 5 }}>
                    <defs>
                      <linearGradient id={`gg${i}`} x1="0" y1="0" x2="0" y2="1">
                        <stop offset="5%" stopColor={g.color} stopOpacity={0.3} /><stop offset="95%" stopColor={g.color} stopOpacity={0} />
                      </linearGradient>
                    </defs>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                    <XAxis dataKey="month" tick={{ fill: C.dim, fontSize: 8, fontFamily: FMO }} stroke={C.border} />
                    <YAxis tick={{ fill: C.dim, fontSize: 8, fontFamily: FMO }} stroke={C.border} tickFormatter={v => fmt$(v)} />
                    <Tooltip contentStyle={TT_STYLE} formatter={v => fmtFull(v)} />
                    <Area type="monotone" dataKey="balance" stroke={g.color} fill={`url(#gg${i})`} strokeWidth={2} dot={false} name="Balance" />
                    <Line type="monotone" dataKey="target" stroke={C.red} strokeDasharray="4 3" strokeWidth={1} dot={false} name="Target" />
                  </AreaChart>
                </ResponsiveContainer>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginTop: 8 }}>
                  <Metric small label="Monthly" value={fmt$(g.alloc)} color={g.color} />
                  <Metric small label="Target" value={fmt$(g.amount)} color={C.dim} />
                  <Metric small label="Timeline" value={`${g.years}yr`} color={C.dim} />
                </div>
              </Card>
            ))}
          </div>
        </div>
      ) : (
        <Card style={{ marginBottom: 13, textAlign: "center", padding: 20 }}>
          <span style={{ fontFamily: FMO, fontSize: 10, color: C.dim }}>NO SAVINGS GOALS — Go back to add goals and see compound growth projections.</span>
        </Card>
      )}

      <div style={{ textAlign: "center", padding: "14px 0", borderTop: `1px solid ${C.border}` }}>
        <p style={{ fontFamily: FMO, fontSize: 9, color: C.dim, lineHeight: 1.7, maxWidth: 600, margin: "0 auto" }}>
          For educational purposes only. Tax drag estimates are approximations. Not tax or investment advice. Consult a qualified advisor.
        </p>
      </div>
    </div>
  );
}


// Mount
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
